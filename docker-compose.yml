version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-ci
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JENKINS_OPTS: "--argumentsRealm.roles.global=admin"
      JAVA_OPTS: "-Xmx512m -Xms512m"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - maven_cache:/root/.m2
    networks:
      - jenkins-network
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok-tunnel
    command: 
      - "http"
      - "8080"
      - "--authtoken=${NGROK_AUTHTOKEN}"
    ports:
      - "4040:4040"
    depends_on:
      - jenkins
    networks:
      - jenkins-network
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    restart: unless-stopped
    profiles:
      - ngrok

volumes:
  jenkins_home:
    driver: local
  maven_cache:
    driver: local

networks:
  jenkins-network:
    driver: bridge
